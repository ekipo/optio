      <rect x="9" y="1" width="6" height="6" rx="1" stroke="#6d28d9" stroke-width="1.5" fill="none"/>
      <rect x="1" y="9" width="6" height="6" rx="1" stroke="#6d28d9" stroke-width="1.5" fill="none"/>
